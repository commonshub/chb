name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release assets
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          mkdir -p dist

          for GOARCH in amd64 arm64; do
            ASSET_BASENAME="chb_${VERSION}_linux_${GOARCH}"
            GOOS=linux GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "dist/${ASSET_BASENAME}" .
            tar -czf "dist/${ASSET_BASENAME}.tar.gz" -C dist "${ASSET_BASENAME}"
          done

          (
            cd dist
            sha256sum chb_* > checksums.txt
          )

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" dist/* --title "${TAG}" --generate-notes
          fi
